name: Sheldon Drive iOS

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  simulator-build:
    name: Build iOS Simulator App
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available iOS runtimes
        run: xcrun simctl list runtimes

      - name: Build Sheldon Drive
        run: ./scripts/build-for-iphone13-promax.sh
