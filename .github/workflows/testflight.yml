name: Sheldon Drive TestFlight

on:
  workflow_dispatch:

jobs:
  upload-testflight:
    name: Build and Upload to TestFlight
    runs-on: macos-26
    env:
      APP_SCHEME: SheldonDrive
      APP_PROJECT: SheldonDrive.xcodeproj
      APP_BUNDLE_ID: com.oreo0727.hermes.sheldondrive
      ARCHIVE_PATH: build/SheldonDrive.xcarchive
      EXPORT_PATH: build/export
      KEYCHAIN_PATH: build/signing.keychain-db
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare signing files
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p build ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > build/distribution.p12
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > build/profile.mobileprovision

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import build/distribution.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          security cms -D -i build/profile.mobileprovision > build/profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' build/profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' build/profile.plist)
          cp build/profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Create export options
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${APP_BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
          </dict>
          </plist>
          EOF

      - name: Archive app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project "$APP_PROJECT" \
            -scheme "$APP_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$APP_BUNDLE_ID" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "$API_PRIVATE_KEY" > "$HOME/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8"
          IPA_PATH="$(find "$EXPORT_PATH" -name '*.ipa' -print -quit)"
          test -n "$IPA_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Add build to TestFlight groups
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          python3 -m venv build/appstoreconnect-venv
          source build/appstoreconnect-venv/bin/activate
          python -m pip install --quiet PyJWT cryptography
          python - <<'PY'
          import json
          import os
          import time
          import urllib.parse
          import urllib.request

          import jwt

          key_id = os.environ["API_KEY_ID"]
          issuer_id = os.environ["API_ISSUER_ID"]
          private_key = os.environ["API_PRIVATE_KEY"]
          bundle_id = os.environ["APP_BUNDLE_ID"]
          build_number = os.environ["BUILD_NUMBER"]
          now = int(time.time())
          token = jwt.encode(
              {"iss": issuer_id, "iat": now, "exp": now + 1200, "aud": "appstoreconnect-v1"},
              private_key,
              algorithm="ES256",
              headers={"kid": key_id, "typ": "JWT"},
          )
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/json",
              "Content-Type": "application/json",
              "User-Agent": "SheldonDrive-GitHubActions",
          }

          def request(path, params=None, *, method="GET", payload=None):
              url = "https://api.appstoreconnect.apple.com/v1" + path
              if params:
                  url += "?" + urllib.parse.urlencode(params, doseq=True)
              data = json.dumps(payload).encode() if payload is not None else None
              req = urllib.request.Request(url, data=data, method=method, headers=headers)
              with urllib.request.urlopen(req, timeout=45) as response:
                  body = response.read().decode()
                  return json.loads(body) if body else {}

          apps = request("/apps", {"filter[bundleId]": bundle_id, "limit": "1"}).get("data", [])
          if not apps:
              raise SystemExit(f"No App Store Connect app found for {bundle_id}")
          app_id = apps[0]["id"]

          build = None
          for _ in range(30):
              builds = request(
                  "/builds",
                  {"filter[app]": app_id, "sort": "-uploadedDate", "limit": "10"},
              ).get("data", [])
              build = next((row for row in builds if row.get("attributes", {}).get("version") == build_number), None)
              if build and build.get("attributes", {}).get("processingState") == "VALID":
                  break
              time.sleep(20)
          if not build:
              raise SystemExit(f"Build {build_number} was not found in App Store Connect")
          if build.get("attributes", {}).get("processingState") != "VALID":
              raise SystemExit(f"Build {build_number} is not valid yet: {build.get('attributes', {}).get('processingState')}")

          groups = request("/betaGroups", {"filter[app]": app_id, "limit": "20"}).get("data", [])
          if not groups:
              raise SystemExit("No TestFlight beta groups found")
          for group in groups:
              request(
                  f"/betaGroups/{group['id']}/relationships/builds",
                  method="POST",
                  payload={"data": [{"type": "builds", "id": build["id"]}]},
              )
              print(f"Attached build {build_number} to TestFlight group {group.get('attributes', {}).get('name')}")
          PY
